name: Run Python Script Periodically

on:
  schedule:
    # Schedule to run every day at midnight UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # enable manual triggering

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Check out repository
        uses: actions/checkout@v6

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the script
      - name: Run the Python script
        run: |
          python run.py

      # Step 5: Commit and push HTML files to the repository
      - name: Commit and push HTML files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/*.html  # Matches all HTML files in the output directory
          if git diff --cached --quiet; then
            echo "No HTML changes to commit"
          else
            git commit -m "Add generated HTML files"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
