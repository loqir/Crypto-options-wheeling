name: Run Python Script Periodically

on:
  schedule:
    # Schedule to run every day at midnight UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # enable manual triggering

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Check out repository
        uses: actions/checkout@v6

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the script
      - name: Run the Python script
        run: |
          python run.py

      # Step 5: Upload generated output for GitHub Pages
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      # Step 6: Commit and push generated artifacts to the repository
      - name: Commit and push generated artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Generated output files:"
          ls -l output || true

          echo "Git status before add:"
          git status --short

          git add output/*.html
          [ -f btc_historical_greeks.parquet ] && git add btc_historical_greeks.parquet
          [ -f eth_historical_greeks.parquet ] && git add eth_historical_greeks.parquet

          echo "Staged changes:"
          git diff --cached --name-status

          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit"
          else
            git commit -m "Update generated html and parquet history"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    needs: run-script
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
