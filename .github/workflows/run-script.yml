name: Run Python Script Periodically

on:
  schedule:
    # Schedule to run every day at midnight UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # enable manual triggering

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Check out repository
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9.6

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run the script
      - name: Run the Python script
        run: |
          python run.py

      # Step 5: Commit and push HTML files to the repository
      - name: Commit and push HTML files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add output/*.html  # Matches all HTML files in the output directory
          git commit -m "Add generated HTML files"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
